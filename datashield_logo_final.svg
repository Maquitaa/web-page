<svg width="100%" viewBox="0 0 680 300" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo DataShield Consulting final</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo con hexágono perfectamente simétrico, paleta bosque nativo</desc>

<rect x="20" y="20" width="640" height="260" rx="12" fill="#0D1F1A" stroke="#1A3028" stroke-width="0.5" style="fill:rgb(13, 31, 26);stroke:rgb(26, 48, 40);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<g transform="translate(52, 50)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <!-- Hexágono exterior: centro (50,50), radio 48 -->
  <!-- Vértices: top(50,2) topright(91.6,26) botright(91.6,74) bot(50,98) botleft(8.4,74) topleft(8.4,26) -->
  <polygon points="50,2 91.6,26 91.6,74 50,98 8.4,74 8.4,26" fill="none" stroke="#5BA88A" stroke-width="2" stroke-linejoin="round" style="fill:none;stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Hexágono interior: centro (50,50), radio 30 -->
  <!-- Vértices: top(50,20) topright(75.98,35) botright(75.98,65) bot(50,80) botleft(24.02,65) topleft(24.02,35) -->
  <polygon points="50,20 75.98,35 75.98,65 50,80 24.02,65 24.02,35" fill="none" stroke="#C9A96E" stroke-width="1.2" stroke-linejoin="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- 6 líneas desde vértices del hexágono interior al centro (50,50) -->
  <line x1="50" y1="20" x2="50" y2="50" stroke="#5BA88A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="75.98" y1="35" x2="50" y2="50" stroke="#5BA88A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="75.98" y1="65" x2="50" y2="50" stroke="#5BA88A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="50" y1="80" x2="50" y2="50" stroke="#5BA88A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="24.02" y1="65" x2="50" y2="50" stroke="#5BA88A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="24.02" y1="35" x2="50" y2="50" stroke="#5BA88A" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Nodo central -->
  <circle cx="50" cy="50" r="7" fill="#5BA88A" style="fill:rgb(91, 168, 138);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="50" cy="50" r="3.5" fill="#0D1F1A" style="fill:rgb(13, 31, 26);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<!-- Wordmark -->
<text x="168" y="112" font-family="Georgia, serif" font-size="34" fill="#E8F0EC" font-weight="400" style="fill:rgb(232, 240, 236);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:34px;font-weight:400;text-anchor:start;dominant-baseline:auto">Data<tspan font-weight="700" fill="#5BA88A" style="fill:rgb(91, 168, 138);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:34px;font-weight:700;text-anchor:start;dominant-baseline:auto">Shield</tspan></text>
<text x="170" y="138" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#C9A96E" letter-spacing="5" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">CONSULTING</text>
<line x1="170" y1="147" x2="530" y2="147" stroke="#5BA88A" stroke-width="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(91, 168, 138);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="170" y="166" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4A7A62" letter-spacing="1" style="fill:rgb(74, 122, 98);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Temuco · Chile · Ley 21.719 · GDPR</text>
</svg>