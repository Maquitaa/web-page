<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO básico -->
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_CL">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <!-- og:image: crea assets/img/og-image.jpg (1200×630) y descomenta la siguiente línea -->
  <!-- <meta property="og:image" content="{{ '/assets/img/og-image.jpg' | absolute_url }}"> -->

  <!-- Seguridad via meta tags (complementa los headers HTTP) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- Tipografías: Fraunces + Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="{{ '/assets/img/logo.png' | relative_url }}">
  <link rel="dns-prefetch" href="//formspree.io">

  <!-- CSS principal -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Jekyll SEO tag (genera meta adicional automáticamente) -->
  {% seo %}

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/img/favicon.ico' | relative_url }}" type="image/x-icon">
  <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png" sizes="any">
  <link rel="apple-touch-icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
</head>

<body>

  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>


  <!-- JS principal -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

</body>
</html>
