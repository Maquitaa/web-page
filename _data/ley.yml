## ─────────────────────────────────────────────
##  Sección Ley 21.719 (ahora un módulo más, no el core)
## ─────────────────────────────────────────────

cards:
  - etiqueta: "Alcance"
    numero: "i."
    titulo: "Aplica a toda empresa que trate datos en Chile."
    descripcion: >
      Desde un RUT en una planilla hasta registros biométricos o de salud.
      Sin importar el tamaño de la empresa ni el rubro.

  - etiqueta: "Derechos del titular"
    numero: "ii."
    titulo: "Acceso, rectificación, cancelación, oposición y portabilidad."
    descripcion: >
      Los titulares pueden exigir respuesta dentro del plazo legal, con
      evidencia de cada interacción registrada.

  - etiqueta: "Notificación de brechas"
    numero: "iii."
    titulo: "72 horas para notificar un incidente."
    descripcion: >
      Sin protocolo preparado, cumplir el plazo es casi imposible. La
      improvisación en estos casos cuesta muy caro.

  - etiqueta: "Carga de la prueba"
    numero: "iv."
    titulo: "No basta cumplir — hay que <em>demostrarlo</em>."
    descripcion: >
      RAT actualizado, evaluaciones de impacto, contratos con terceros.
      La carga de la prueba recae sobre la empresa, no sobre la Agencia.

aside:
  mono: "El enfoque DataShield"
  titulo: "El cumplimiento es una <em>capacidad operativa</em>, no un proyecto de una vez."
  descripcion: >
    No entregamos carpetas con documentos que nadie vuelve a abrir. Construimos
    junto a tus equipos la operación real que sostiene el cumplimiento en el tiempo.
  items:
    - "Consultor senior dedicado por módulo"
    - "Documentación viva, no entregable estático"
    - "Capacitación interna para autonomía operativa"
    - "Integración con los sistemas que ya usas"
