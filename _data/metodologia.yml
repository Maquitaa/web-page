## ─────────────────────────────────────────────
##  Etapas de la metodología
## ─────────────────────────────────────────────

- numero: "01"
  etapa: "Diagnóstico"
  titulo: "Evaluamos tu <em>punto de partida</em>"
  descripcion: >
    Sesión gratuita de 60 minutos con un consultor senior. Revisamos el estado
    actual, los riesgos prioritarios y qué módulos tienen mayor impacto.
  meta_izq: "Sin compromiso"
  meta_der: "60 min"

- numero: "02"
  etapa: "Diseño"
  titulo: "Hoja de ruta <em>modular</em>"
  descripcion: >
    Plan de implementación con fases, entregables y métricas. Tú decides el
    ritmo y el alcance — sin paquetes forzados.
  meta_izq: "Plan escrito"
  meta_der: "1–2 semanas"

- numero: "03"
  etapa: "Implementación"
  titulo: "Trabajamos <em>codo a codo</em>"
  descripcion: >
    Implementación acompañada con tus equipos legal, TI y operaciones.
    Plataforma activa desde la primera semana del módulo.
  meta_izq: "Acompañado"
  meta_der: "4–12 semanas"

- numero: "04"
  etapa: "Traspaso"
  titulo: "Capacidades <em>instaladas</em>"
  descripcion: >
    Capacitación a tu equipo interno, documentación viva y revisiones
    periódicas. Tu autonomía es nuestra métrica de éxito.
  meta_izq: "Continuo"
  meta_der: "Recurrente"
