## ─────────────────────────────────────────────
##  Cómo trabajamos — etapas
## ─────────────────────────────────────────────

- numero: "01"
  etapa: "Assessment"
  titulo: "Entendemos tu <em>realidad actual</em>"
  descripcion: >
    60 minutos con un consultor senior. Sin PowerPoint de ventas — solo
    preguntas honestas sobre tus procesos, datos y tecnología. Al terminar
    sabes exactamente dónde estás parado y qué opciones tienes.
  meta_izq: "Gratis · sin compromiso"
  meta_der: "60 min"

- numero: "02"
  etapa: "Diagnóstico"
  titulo: "Mapa claro de <em>qué hacer</em>"
  descripcion: >
    Entregamos un documento con hallazgos, oportunidades priorizadas y una
    hoja de ruta concreta. Tú decides qué abordar primero según tu presupuesto
    y urgencia — sin paquetes forzados.
  meta_izq: "Entregable escrito"
  meta_der: "1–2 semanas"

- numero: "03"
  etapa: "Implementación"
  titulo: "Construimos <em>codo a codo</em>"
  descripcion: >
    Trabajamos con tus equipos, no sobre ellos. Cada decisión técnica se
    explica y se valida contigo. La plataforma o el proceso nuevo funciona
    desde la primera semana del proyecto.
  meta_izq: "Con tu equipo"
  meta_der: "4–12 semanas"

- numero: "04"
  etapa: "Traspaso"
  titulo: "Tu equipo <em>lo opera solo</em>"
  descripcion: >
    Capacitamos internamente, documentamos todo y hacemos revisiones periódicas.
    El éxito lo medimos en que no nos necesites para el día a día — aunque
    seguimos disponibles cuando la tecnología o el negocio evoluciona.
  meta_izq: "Autonomía real"
  meta_der: "Continuo"
