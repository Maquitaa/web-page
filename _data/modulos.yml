- codigo: "S.01"
  etiqueta: "S.01 · PUNTO DE PARTIDA"
  icono: "◎"
  tipo: "destacado"
  tag: "SIEMPRE PRIMERO"
  titulo: "Diagnóstico &amp;<br><em>Assessment</em>"
  descripcion: >
    Antes de proponer cualquier tecnología, entendemos dónde está parada
    la empresa. Revisamos procesos, calidad de datos, sistemas actuales
    y brechas de cumplimiento — y entregamos un mapa claro de qué hacer,
    en qué orden y con qué impacto esperado.
  features:
    - "Mapeo de procesos y cuellos de botella"
    - "Diagnóstico de calidad y gobierno del dato"
    - "Evaluación de madurez tecnológica"
    - "Análisis de exposición legal Ley 21.719"
    - "Hoja de ruta priorizada con estimación de impacto"
  cta: "Agendar diagnóstico →"

