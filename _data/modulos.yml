  icono: "⟳"
  tipo: "medio"
  titulo: "Modernización<br><em>de Procesos</em>"
  descripcion: >
    Eliminamos redundancias, pasos manuales sin valor y tiempos muertos.
    Automatizamos lo que tiene sentido, rediseñamos flujos y conectamos
    sistemas que hoy no se hablan. El resultado: menos esfuerzo operativo
    y más capacidad para lo que importa.
  features:
    - "Rediseño de flujos de trabajo críticos"
    - "Automatización de procesos repetitivos (RPA)"
    - "Integración entre sistemas y eliminación de silos"
  cta: "Ver servicio →"

