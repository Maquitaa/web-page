mono: "Quiénes somos"
titulo: "Ingenieros y abogados con 13 años de experiencia en el <em>mundo del dato</em>."
descripcion: >
  DataShield nació desde la Araucanía con una convicción: que las empresas
  chilenas merecen acceso a metodologías y tecnologías de clase mundial,
  con profesionales que entienden su realidad concreta.

descripcion_2: >
  Combinamos arquitectura de datos de clase enterprise con conocimiento legal
  en protección de datos — dos disciplinas que raramente van juntas, y que son
  exactamente lo que necesita una empresa que quiere transformarse sin exponerse.
  Trayectoria real en proyectos de transformación digital en Chile y el extranjero,
  incluyendo cumplimiento de GDPR europeo y marcos regulatorios internacionales.

