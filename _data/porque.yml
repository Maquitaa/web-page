## ─────────────────────────────────────────────
##  Por qué DataShield — contenido emocional y real
## ─────────────────────────────────────────────

- numero: "i."
  titulo: "Hemos visto muchas implementaciones fallar. <em>Sabemos exactamente por qué.</em>"
  descripcion: >
    Como consultores, implementadores, arquitectos y desarrolladores, hemos vivido
    proyectos fracasar — no por falta de tecnología, sino por falta de diagnóstico.
    Hemos visto empresas a las que les vendieron bazukas cuando necesitaban algo más chico.
    Y hemos visto sobrecostos, retrasos y equipos agotados de soluciones que prometían
    todo y entregaban poco. Nosotros llegamos a entender tu realidad antes de proponer
    cualquier cosa — y solo proponemos lo que tiene sentido para ti.

- numero: "ii."
  titulo: "Somos de La Araucanía. <em>Tu realidad es nuestra realidad.</em>"
  descripcion: >
    Somos familia del sur de Chile. No traemos metodologías genéricas armadas
    para empresas de otro contexto. Conocemos los tiempos reales, los presupuestos
    reales y los dolores reales de las empresas de la región. Te acompañamos sin
    impactar tu operación — mejoramos tus tiempos, reportes, accesos y disponibilidad,
    y te ayudamos a tomar decisiones más informadas. Sin dejarte dependiente.
    Sin cobrar por lo que no necesitas.

- numero: "iii."
  titulo: "Construimos contigo. <em>Tu equipo queda con las herramientas.</em>"
  descripcion: >
    No entregamos documentos que nadie vuelve a abrir ni dejamos sistemas que
    solo nosotros sabemos operar. Capacitamos, documentamos y transferimos el
    conocimiento real a tu equipo. El éxito lo medimos en que no nos necesites
    para el día a día. Eso incluye workshops de IA, de gobierno del dato, de GDPR
    y de cada tecnología que implementamos — porque el objetivo es que tu equipo
    crezca, no que dependa de nosotros.
