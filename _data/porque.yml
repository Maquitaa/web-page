## ─────────────────────────────────────────────
##  Razones para elegir DataShield
## ─────────────────────────────────────────────

- numero: "i."
  titulo: "Consultores <em>senior</em>, no juniors aprendiendo."
  descripcion: >
    Cada módulo lo lidera un consultor con experiencia demostrable en
    protección de datos. No hay equipos rotando ni "aprendizaje en cliente".

- numero: "ii."
  titulo: "Modular <em>de verdad</em>, no un paquete encubierto."
  descripcion: >
    Contratas el módulo que necesitas, con entregables acotados y precio
    transparente. Sin amarres ni ventas cruzadas forzadas.

- numero: "iii."
  titulo: "Traspaso, <em>no dependencia</em>."
  descripcion: >
    Nuestro éxito se mide en la autonomía operativa que queda en tu empresa.
    La relación continúa porque la ley evoluciona — no porque sin nosotros
    no funciones.
