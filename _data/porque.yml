## ─────────────────────────────────────────────
##  Por qué DataShield
## ─────────────────────────────────────────────

- numero: "i."
  titulo: "Empezamos con la <em>verdad</em>, no con una propuesta."
  descripcion: >
    El assessment siempre es primero. No vendemos soluciones antes de entender
    el problema. Si lo que necesitas no somos nosotros, te lo decimos igual.

- numero: "ii."
  titulo: "Desde la Araucanía, <em>con visión global</em>."
  descripcion: >
    Entendemos la realidad de las empresas del sur de Chile — sus recursos,
    sus tiempos, sus contextos. Y traemos metodologías y tecnologías del nivel
    de cualquier consultora de Santiago o internacional.

- numero: "iii."
  titulo: "Te dejamos <em>capacidad instalada</em>, no dependencia."
  descripcion: >
    Cuando terminamos un proyecto, tu equipo sabe operar lo que construimos.
    Seguimos acompañando porque la tecnología evoluciona — no porque no puedas
    sin nosotros.
