## ─────────────────────────────────────────────
##  Por qué DataShield
## ─────────────────────────────────────────────

- numero: "i."
  titulo: "Diagnóstico antes que <em>solución</em>."
  descripcion: >
    No proponemos tecnología antes de entender el problema. El assessment
    es siempre el primer paso — y el resultado es un mapa claro de qué
    hacer, en qué orden y con qué impacto esperado. Sin suposiciones.

- numero: "ii."
  titulo: "Raíces en el sur, <em>estándares globales</em>."
  descripcion: >
    Conocemos la escala, los tiempos y los contextos reales de las
    empresas chilenas. Eso nos permite aplicar metodologías y tecnologías
    de clase internacional de una manera que efectivamente se implementa
    — no queda en una presentación.

- numero: "iii."
  titulo: "Capacidad instalada, <em>no dependencia permanente</em>."
  descripcion: >
    Cada proyecto termina con tu equipo operando lo que construimos.
    Documentamos, capacitamos y transferimos el conocimiento. Seguimos
    disponibles porque la tecnología evoluciona — no porque no puedas
    funcionar sin nosotros.
