<!-- ─── NAVEGACIÓN ─────────────────────────────────────────
     Edita links en _data/site.yml → nav_links
     ──────────────────────────────────────────────────────── -->
<nav class="nav" role="navigation" aria-label="Navegación principal">

  <a href="{{ '/' | relative_url }}" class="logo" aria-label="{{ site.data.site.nombre }} {{ site.data.site.apellido }}">
    <img
      src="{{ '/assets/img/logo.png' | relative_url }}"
      alt="{{ site.data.site.nombre }} {{ site.data.site.apellido }}"
      class="logo-img"
      height="40"
    >
  </a>

  <div class="nav-links">
    {% for item in site.data.site.nav_links %}
      <a href="{{ item.href }}"
         {% if item.dropdown %}class="has-dropdown"{% endif %}>
        {{ item.label }}
      </a>
    {% endfor %}
  </div>

  <div class="nav-cta">
    <a href="{{ site.data.site.cta_nav.href }}" class="btn btn-primary">
      {{ site.data.site.cta_nav.label }}
    </a>
  </div>

</nav>
