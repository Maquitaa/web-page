<!-- ─── SECCIÓN POR QUÉ DATASHIELD ──────────────────────────
     Edita razones en _data/porque.yml
     ──────────────────────────────────────────────────────── -->
<section class="why-section">
  <div class="why-inner">

    <div class="section-header">
      <h2>¿Trabajarías con una empresa solo por su logo?<br><em>Entramos por otra puerta.</em></h2>
      <div class="mono">Por qué DataShield</div>
    </div>

    <div class="why-grid">
      {% for reason in site.data.porque %}
      <div class="why-card">
        <div class="number">{{ reason.numero }}</div>
        <h3>{{ reason.titulo }}</h3>
        <p>{{ reason.descripcion }}</p>
      </div>
      {% endfor %}
    </div>

  </div>
</section>
