<!-- ─── CTA FINAL ─────────────────────────────────────────────
     Edita en _data/cta.yml
     Para conectar un formulario real, cambia cta_href en cta.yml
     a tu link de Calendly, Typeform, o deja "#" para el form interno.
     ──────────────────────────────────────────────────────── -->
{% assign c = site.data.cta %}

<section class="cta-section" id="cta">
  <div class="cta-box">

    <div>
      <span class="mono">{{ c.mono }}</span>
      <h3>{{ c.titulo }}</h3>
      <p class="cta-desc">{{ c.descripcion }}</p>
    </div>

    <div class="cta-card">
      <div class="cta-card-title">{{ c.caja_titulo }}</div>
      <ul>
        {% for item in c.caja_items %}
          <li>{{ item }}</li>
        {% endfor %}
      </ul>
      <a href="{{ c.cta_href }}" class="btn btn-gold" style="width:100%;justify-content:center">
        {{ c.cta_label }}
      </a>
    </div>

  </div>
</section>
